<template name="compare">
  <h2>Compare Runs</h2>

  <div class="d-flex gap-2 align-items-end mb-4">
    <div class="flex-fill">
      <label class="form-label">Baseline</label>
      <select class="form-select form-select-sm" id="tagA">
        <option value="" selected={{isSelected "" "a"}}>Select tag...</option>
        {{#each tags}}
          <option value="{{this}}" selected={{isSelected this "a"}}>{{this}}</option>
        {{/each}}
      </select>
    </div>
    <div>
      <button class="btn btn-sm btn-outline-secondary mb-1" id="swapCompare" title="Swap">⇄</button>
    </div>
    <div class="flex-fill">
      <label class="form-label">Target</label>
      <select class="form-select form-select-sm" id="tagB">
        <option value="" selected={{isSelected "" "b"}}>Select tag...</option>
        {{#each tags}}
          <option value="{{this}}" selected={{isSelected this "b"}}>{{this}}</option>
        {{/each}}
      </select>
    </div>
    <div class="flex-fill">
      <label class="form-label">Scenario</label>
      <select class="form-select form-select-sm" id="scenarioFilter">
        <option value="" selected={{isSelected "" "scenario"}}>All scenarios</option>
        {{#each scenarios}}
          <option value="{{this}}" selected={{isSelected this "scenario"}}>{{this}}</option>
        {{/each}}
      </select>
    </div>
  </div>

  {{#if showComparison}}
    {{#if baselineRun}}
      <div class="table-responsive">
        <table class="table table-bordered">
          <thead class="table-dark">
            <tr>
              <th>Metric</th>
              <th>{{selectedTagA}} (baseline)</th>
              <th>{{selectedTagB}} (target)</th>
              <th>Delta</th>
              <th>Relative</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            {{#each comparisonRows}}
              <tr>
                <td title="{{tooltip}}" style="cursor: help; border-bottom: 1px dotted #999;">{{label}}</td>
                <td>{{baselineVal}}</td>
                <td>{{targetVal}}</td>
                <td class="{{deltaClass}}">{{{deltaStr}}}</td>
                <td class="text-muted" style="font-size: 0.85rem">{{relativeStr}}</td>
                <td>{{{statusIcon}}}</td>
              </tr>
            {{/each}}
          </tbody>
        </table>
      </div>
    {{else}}
      <div class="alert alert-warning">No matching runs found for these tags.</div>
    {{/if}}
  {{/if}}
</template>
