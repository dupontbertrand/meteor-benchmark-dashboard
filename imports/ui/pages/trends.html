<template name="trends">
  <h2>Performance Trends</h2>

  <!-- Filters -->
  <div class="row mb-3">
    <div class="col">
      <label class="form-label">Scenario</label>
      <select class="form-select form-select-sm" id="trendScenario">
        {{#each scenarios}}
          <option value="{{this}}" selected={{isSelected this "scenario"}}>{{this}}</option>
        {{/each}}
      </select>
    </div>
    <div class="col">
      <label class="form-label">Metric</label>
      <select class="form-select form-select-sm" id="trendMetric">
        <option value="wall_clock" selected={{isSelected "wall_clock" "metric"}}>Wall Clock (s)</option>
        <option value="cpu_avg" selected={{isSelected "cpu_avg" "metric"}}>APP CPU avg (%)</option>
        <option value="ram_avg" selected={{isSelected "ram_avg" "metric"}}>APP RAM avg (MB)</option>
        <option value="gc_total" selected={{isSelected "gc_total" "metric"}}>GC total pause (ms)</option>
        <option value="gc_max" selected={{isSelected "gc_max" "metric"}}>GC max pause (ms)</option>
        <option value="gc_count" selected={{isSelected "gc_count" "metric"}}>GC count</option>
      </select>
    </div>
    <div class="col">
      <label class="form-label">Primary tag</label>
      <select class="form-select form-select-sm" id="trendTag">
        {{#each tags}}
          <option value="{{this}}" selected={{isSelected this "tag"}}>{{this}}</option>
        {{/each}}
      </select>
    </div>
    <div class="col">
      <label class="form-label">Compare with</label>
      <select class="form-select form-select-sm" id="trendCompareTag">
        <option value="" selected={{isSelected "" "compare"}}>None</option>
        {{#each tags}}
          <option value="{{this}}" selected={{isSelected this "compare"}}>{{this}}</option>
        {{/each}}
      </select>
    </div>
    <div class="col">
      <label class="form-label">Range</label>
      <select class="form-select form-select-sm" id="trendRange">
        <option value="10" selected={{isSelected "10" "range"}}>Last 10 runs</option>
        <option value="25" selected={{isSelected "25" "range"}}>Last 25 runs</option>
        <option value="50" selected={{isSelected "50" "range"}}>Last 50 runs</option>
        <option value="7d" selected={{isSelected "7d" "range"}}>Last 7 days</option>
        <option value="30d" selected={{isSelected "30d" "range"}}>Last 30 days</option>
        <option value="90d" selected={{isSelected "90d" "range"}}>Last 90 days</option>
        <option value="all" selected={{isSelected "all" "range"}}>All time</option>
      </select>
    </div>
  </div>

  {{#if hasData}}

    <!-- Chart + context panel -->
    <div class="row mb-3">
      <div class="col-md-9">
        <div class="card">
          <div class="card-body py-2">
            <canvas id="trendChart" height="90"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card h-100">
          <div class="card-header py-2"><strong>{{selectedTag}}</strong></div>
          <div class="card-body py-2">
            <table class="table table-sm table-borderless mb-0" style="font-size: 0.85rem">
              {{#with stats}}
                <tr><td class="text-muted">Latest</td><td class="fw-bold">{{latest}}</td></tr>
                <tr><td class="text-muted">Median</td><td>{{median}}</td></tr>
                <tr><td class="text-muted">Min</td><td>{{min}}</td></tr>
                <tr><td class="text-muted">Max</td><td>{{max}}</td></tr>
                <tr><td class="text-muted">Runs</td><td>{{count}}</td></tr>
                <tr><td class="text-muted">Last run</td><td>{{lastRun}}</td></tr>
              {{/with}}
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Metric explanation -->
    <div class="card mb-3">
      <div class="card-body text-muted small py-2">
        {{{metricExplanation}}}
      </div>
    </div>

    <!-- Cross-version comparison table -->
    {{#if hasCrossVersion}}
    <h5 class="mt-4">Latest values across versions</h5>
    <div class="table-responsive">
      <table class="table table-sm table-bordered">
        <thead class="table-light">
          <tr>
            <th>Tag</th>
            <th>Latest</th>
            <th>Median</th>
            <th>Runs</th>
            <th>Last run</th>
          </tr>
        </thead>
        <tbody>
          {{#each crossVersionRows}}
            <tr>
              <td><span class="badge" style="background-color: {{color}}">{{tag}}</span> {{{configBadges config}}}</td>
              <td class="fw-bold">{{latest}}</td>
              <td>{{median}}</td>
              <td>{{count}}</td>
              <td class="text-muted" style="font-size: 0.8rem">{{lastRun}}</td>
            </tr>
          {{/each}}
        </tbody>
      </table>
    </div>
    {{/if}}

  {{else}}
    <div class="alert alert-info mt-3">No data for this selection yet.</div>
  {{/if}}
</template>
