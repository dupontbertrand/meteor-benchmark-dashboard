<template name="trends">
  <h2>Performance Trends</h2>

  <!-- Filters -->
  <div class="row mb-3">
    <div class="col">
      <label class="form-label">Scenario</label>
      <select class="form-select form-select-sm" id="trendScenario">
        {{#each scenarios}}
          <option value="{{this}}">{{this}}</option>
        {{/each}}
      </select>
    </div>
    <div class="col">
      <label class="form-label">Metric</label>
      <select class="form-select form-select-sm" id="trendMetric">
        <option value="wall_clock">Wall Clock (s)</option>
        <option value="cpu_avg">APP CPU avg (%)</option>
        <option value="ram_avg">APP RAM avg (MB)</option>
        <option value="gc_total">GC total pause (ms)</option>
        <option value="gc_max">GC max pause (ms)</option>
        <option value="gc_count">GC count</option>
      </select>
    </div>
    <div class="col">
      <label class="form-label">Primary tag</label>
      <select class="form-select form-select-sm" id="trendTag">
        {{#each tags}}
          <option value="{{this}}">{{this}}</option>
        {{/each}}
      </select>
    </div>
    <div class="col">
      <label class="form-label">Compare with</label>
      <select class="form-select form-select-sm" id="trendCompareTag">
        <option value="">None</option>
        {{#each tags}}
          <option value="{{this}}">{{this}}</option>
        {{/each}}
      </select>
    </div>
    <div class="col">
      <label class="form-label">Range</label>
      <select class="form-select form-select-sm" id="trendRange">
        <option value="10">Last 10 runs</option>
        <option value="25">Last 25 runs</option>
        <option value="50">Last 50 runs</option>
        <option value="7d">Last 7 days</option>
        <option value="30d">Last 30 days</option>
        <option value="90d">Last 90 days</option>
        <option value="all">All time</option>
      </select>
    </div>
  </div>

  {{#if hasData}}

    <!-- Chart + context panel -->
    <div class="row mb-3">
      <div class="col-md-9">
        <div class="card">
          <div class="card-body py-2">
            <canvas id="trendChart" height="90"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card h-100">
          <div class="card-header py-2"><strong>{{selectedTag}}</strong></div>
          <div class="card-body py-2">
            <table class="table table-sm table-borderless mb-0" style="font-size: 0.85rem">
              {{#with stats}}
                <tr><td class="text-muted">Latest</td><td class="fw-bold">{{latest}}</td></tr>
                <tr><td class="text-muted">Median</td><td>{{median}}</td></tr>
                <tr><td class="text-muted">Min</td><td>{{min}}</td></tr>
                <tr><td class="text-muted">Max</td><td>{{max}}</td></tr>
                <tr><td class="text-muted">Runs</td><td>{{count}}</td></tr>
                <tr><td class="text-muted">Last run</td><td>{{lastRun}}</td></tr>
              {{/with}}
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Metric explanation -->
    <div class="card mb-3">
      <div class="card-body text-muted small py-2">
        {{{metricExplanation}}}
      </div>
    </div>

    <!-- Cross-version comparison table -->
    {{#if hasCrossVersion}}
    <h5 class="mt-4">Latest values across versions</h5>
    <div class="table-responsive">
      <table class="table table-sm table-bordered">
        <thead class="table-light">
          <tr>
            <th>Tag</th>
            <th>Latest</th>
            <th>Median</th>
            <th>Runs</th>
            <th>Last run</th>
          </tr>
        </thead>
        <tbody>
          {{#each crossVersionRows}}
            <tr>
              <td><span class="badge" style="background-color: {{color}}">{{tag}}</span></td>
              <td class="fw-bold">{{latest}}</td>
              <td>{{median}}</td>
              <td>{{count}}</td>
              <td class="text-muted" style="font-size: 0.8rem">{{lastRun}}</td>
            </tr>
          {{/each}}
        </tbody>
      </table>
    </div>
    {{/if}}

  {{else}}
    <div class="alert alert-info mt-3">No data for this selection yet.</div>
  {{/if}}
</template>
