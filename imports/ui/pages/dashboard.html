<template name="dashboard">

  <!-- Header + selectors -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="mb-0">Release Health</h2>
      <small class="text-muted">
        How does <strong>{{targetTag}}</strong> perform compared to <strong>{{baselineTag}}</strong>?
      </small>
    </div>
    <div class="d-flex gap-2 align-items-center">
      <div class="text-end" style="font-size: 0.75rem">
        <div class="text-muted">reference</div>
        <select class="form-select form-select-sm" id="healthBaseline" style="width: auto;">
          {{#each tags}}
            <option value="{{this}}" selected={{isBaseline this}}>{{this}}</option>
          {{/each}}
        </select>
      </div>
      <button class="btn btn-sm btn-outline-secondary" id="swapTags" title="Swap">⇄</button>
      <div style="font-size: 0.75rem">
        <div class="text-muted">testing</div>
        <select class="form-select form-select-sm" id="healthTarget" style="width: auto;">
          {{#each tags}}
            <option value="{{this}}" selected={{isTarget this}}>{{this}}</option>
          {{/each}}
        </select>
      </div>
    </div>
  </div>

  {{#if Template.subscriptionsReady}}

    <!-- ═══ SECTION 1: Release verdict ═══ -->
    {{#with diagnosis}}
      <div class="card mb-4 border-{{borderClass}}">
        <div class="card-body py-3">
          <div class="d-flex align-items-center gap-3 mb-2">
            <span class="badge bg-{{badgeClass}} fs-6 px-3 py-2">{{verdict}}</span>
            <span class="text-muted">{{summary}}</span>
          </div>

          {{#if hasHighlights}}
          <div class="row mt-2">
            {{#if topImprovement}}
            <div class="col-md-6">
              <div class="small">
                <span class="text-success fw-bold">Biggest improvement in {{targetTag}}</span>
                <div>{{topImprovement.label}} — {{topImprovement.metric}} <strong>{{topImprovement.deltaStr}}</strong> vs {{baselineTag}}</div>
                <div class="text-muted" style="font-size: 0.75rem">{{topImprovement.interpret}}</div>
              </div>
            </div>
            {{/if}}
            {{#if topRegression}}
            <div class="col-md-6">
              <div class="small">
                <span class="text-danger fw-bold">Biggest regression in {{targetTag}}</span>
                <div>{{topRegression.label}} — {{topRegression.metric}} <strong>{{topRegression.deltaStr}}</strong> vs {{baselineTag}}</div>
                <div class="text-muted" style="font-size: 0.75rem">{{topRegression.interpret}}</div>
              </div>
            </div>
            {{/if}}
          </div>
          {{/if}}
        </div>
      </div>
    {{/with}}

    <!-- ═══ SECTION 2: Canonical fingerprint ═══ -->
    {{#if hasFingerprint}}
    <div class="card mb-4">
      <div class="card-body py-2">
        <div class="row text-center">
          {{#each fingerprint}}
            <div class="col">
              <div class="small text-muted">{{label}}</div>
              <div class="fs-5 fw-bold">{{value}}</div>
              <div class="small {{deltaClass}}">{{delta}}</div>
              <div style="font-size: 0.65rem" class="text-muted">{{source}}</div>
            </div>
          {{/each}}
        </div>
      </div>
    </div>
    {{/if}}

    <!-- ═══ SECTION 3: Top changes ═══ -->
    {{#if hasChanges}}
    <div class="row mb-4">
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header py-2 text-success"><strong>Top improvements</strong></div>
          <ul class="list-group list-group-flush">
            {{#each improvements}}
              <li class="list-group-item py-2">
                <div class="d-flex justify-content-between">
                  <div>
                    <a href="/scenario/{{scenario}}">{{label}}</a>
                    <span class="text-muted small"> — {{metric}}</span>
                  </div>
                  <span class="text-success fw-bold">{{deltaStr}}</span>
                </div>
                <div class="text-muted" style="font-size: 0.72rem">{{interpret}}</div>
              </li>
            {{/each}}
            {{#unless improvements}}
              <li class="list-group-item py-2 text-muted">No significant improvements detected</li>
            {{/unless}}
          </ul>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header py-2 text-danger"><strong>Top regressions</strong></div>
          <ul class="list-group list-group-flush">
            {{#each regressions}}
              <li class="list-group-item py-2">
                <div class="d-flex justify-content-between">
                  <div>
                    <a href="/scenario/{{scenario}}">{{label}}</a>
                    <span class="text-muted small"> — {{metric}}</span>
                  </div>
                  <span class="text-danger fw-bold">{{deltaStr}}</span>
                </div>
                <div class="text-muted" style="font-size: 0.72rem">{{interpret}}</div>
              </li>
            {{/each}}
            {{#unless regressions}}
              <li class="list-group-item py-2 text-muted">No significant regressions detected</li>
            {{/unless}}
          </ul>
        </div>
      </div>
    </div>
    {{/if}}

    <!-- ═══ SECTION 4: Families ═══ -->
    {{#each families}}
      <div class="card mb-3">
        <div class="card-header py-2 d-flex align-items-center gap-2">
          <span>{{icon}}</span>
          <strong>{{label}}</strong>
          <span class="badge bg-secondary ms-auto">{{scenarioCount}} scenario{{#unless isSingle}}s{{/unless}}</span>
        </div>
        <div class="card-body p-0">
          <table class="table table-sm mb-0">
            <thead>
              <tr class="table-light">
                <th style="width: 28%">Scenario</th>
                <th style="width: 12%">Wall Clock</th>
                <th style="width: 12%">CPU avg</th>
                <th style="width: 12%">RAM avg</th>
                <th style="width: 12%">GC pause</th>
                <th style="width: 14%">vs baseline</th>
                <th style="width: 10%">Confidence</th>
              </tr>
            </thead>
            <tbody>
              {{#each rows}}
                <tr>
                  <td>
                    <a href="/scenario/{{scenario}}">{{scenarioLabel}}</a>
                    <div class="text-muted" style="font-size: 0.72rem">{{interpret}}</div>
                  </td>
                  <td>{{wallClock}}</td>
                  <td>{{cpu}}</td>
                  <td>{{ram}}</td>
                  <td>{{gc}}</td>
                  <td>{{{verdict}}}</td>
                  <td>
                    <div class="text-muted" style="font-size: 0.75rem">{{runCount}} runs</div>
                    <div class="text-muted" style="font-size: 0.68rem">{{lastRunDate}}</div>
                  </td>
                </tr>
              {{/each}}
              {{#unless rows}}
                <tr><td colspan="7" class="text-muted text-center py-2">No data yet</td></tr>
              {{/unless}}
            </tbody>
          </table>
        </div>
      </div>
    {{/each}}

    <!-- Recent runs (collapsed) -->
    <details class="mb-4">
      <summary class="text-muted" style="cursor: pointer">
        Show all recent runs ({{totalRunCount}})
      </summary>
      <div class="table-responsive mt-2">
        <table class="table table-striped table-hover table-sm">
          <thead class="table-dark">
            <tr>
              <th>Date</th>
              <th>Tag</th>
              <th>Scenario</th>
              <th>Wall Clock</th>
              <th>CPU</th>
              <th>RAM</th>
              <th>GC</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {{#each recentRuns}}
              <tr>
                <td>{{formatDate timestamp}}</td>
                <td><span class="badge bg-primary">{{tag}}</span> {{{configBadges config}}}</td>
                <td><a href="/scenario/{{scenario}}">{{scenario}}</a></td>
                <td>{{formatMs wall_clock_ms}}</td>
                <td>{{cpuAvg}}%</td>
                <td>{{ramAvg}} MB</td>
                <td>{{gcPause}} ms</td>
                <td><a href="/run/{{_id}}" class="btn btn-sm btn-outline-secondary py-0">Detail</a></td>
              </tr>
            {{/each}}
          </tbody>
        </table>
      </div>
    </details>

  {{else}}
    <div class="text-center my-5">
      <div class="spinner-border" role="status"></div>
      <p class="mt-2">Loading...</p>
    </div>
  {{/if}}
</template>
